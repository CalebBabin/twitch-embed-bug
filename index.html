<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed bug demo</title>
    <style>
        body,
        html,
        :root {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            position: absolute;
        }

        iframe {
            position: absolute;
            width: calc(50vmin) !important;
            height: calc(50vmin / (16/9)) !important;
            background-color: black;
        }

        .block {
            position: absolute;
            z-index: 90;
            top: 50%;
            left: 50%;
            margin: -5vmin;
            width: 10vmin;
            height: 10vmin;
            background: black;
        }
    </style>
</head>

<body>

    <script>
        const channel = prompt("Enter the username of a live twitch channel:");
        const iframe = document.createElement('iframe');
        document.body.appendChild(iframe);
        iframe.setAttribute('src', `https://player.twitch.tv/?autoplay=true&muted=true&channel=${channel}&parent=${location.hostname || 'localhost'}`);

        function positionIframeCenter() {
            const box = iframe.getBoundingClientRect();
            iframe.style.left = (window.innerWidth / 2 - box.width / 2) + 'px';
            iframe.style.top = (window.innerHeight / 2 - box.height / 2) + 'px';
        }
        positionIframeCenter();

        window.addEventListener('resize', () => {
            positionIframeCenter();
        })

        let moving = false;

        function draw() {
            if (!moving) return;
            window.requestAnimationFrame(draw);

            const rotation1 = Date.now() / 2000;
            const rotation2 = Date.now() / 4423;
            iframe.style.transform = 'translateX(' + (Math.sin(rotation1) * 30 * (Math.sin(rotation2) + 2)) + 'vmin) translateY(' + (Math.cos(rotation1) * 30) + 'vmin)';
        }

        window.addEventListener('movePlayer', () => {
            moving = !moving;
            if (moving) draw();
            console.log(moving);
        })
    </script>


    <div style="position:absolute; z-index: 100; bottom:1rem; left:50%;">
        <button style="margin-left: -50%;" onClick="window.dispatchEvent(new CustomEvent('movePlayer'))">move
            player</button>
    </div>

    <div class="block" style="background: #ff0000; margin-left: 35vmin;"></div>
    <div class="block" style="background: #0000ff; margin-left: -40vmin;"></div>
</body>

</html>
